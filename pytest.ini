[pytest]
# 测试文件发现规则
testpaths = aerospace_agent/mcp/tests tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 输出选项
addopts =
    -v
    --tb=short
    --strict-markers
    -ra
    -p no:tmpdir

# 标记注册
markers =
    slow: 标记慢测试（>1s）
    integration: 需要外部服务的集成测试
    qwen3: 需要本地 Qwen3 服务的测试
    offline: 纯离线测试（默认）

# 过滤警告
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# 日志格式
log_cli = false
log_level = WARNING
